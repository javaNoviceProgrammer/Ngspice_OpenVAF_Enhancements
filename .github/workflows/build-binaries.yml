name: Build binaries

# Builds ngspice and openvaf-r natively on each platform and drops the
# resulting binaries into bin/<os>/<arch>/.  Native runners are used per
# target so each build links against its own LLVM 18 — no cross-compilation.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'bin/**'        # binary commits made by this workflow must not retrigger it
      - '**/*.md'

permissions:
  contents: write       # the collect job commits binaries back into bin/

env:
  OPENVAF_DIR: OpenVAF-master-20260610
  NGSPICE_DIR: ngspice-46

jobs:
  # ------------------------------------------------------------------ Unix
  build-unix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-intel,         os: ubuntu-latest,    bin: linux/intel }
          - { name: linux-arm,           os: ubuntu-24.04-arm, bin: linux/arm }
          - { name: macos-intel,         os: macos-13,         bin: macos/intel }
          - { name: macos-apple-silicon, os: macos-14,         bin: macos/apple-silicon }
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          # Ubuntu 24.04 (both x86 and arm runners) ships LLVM 18 natively, so
          # install from the distro repos.  The apt.llvm.org repo is avoided
          # because on arm64 it conflicts with noble's packages ("held broken
          # packages").
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential automake autoconf libtool bison flex pkg-config \
            llvm-18 llvm-18-dev libclang-18-dev clang-18 libpolly-18-dev \
            zlib1g-dev libzstd-dev libtinfo-dev libxml2-dev \
            libreadline-dev libx11-dev libxaw7-dev libxft-dev libxext-dev libxmu-dev libxt-dev
          PREFIX="$(llvm-config-18 --prefix)"
          echo "LLVM_SYS_181_PREFIX=$PREFIX" >> "$GITHUB_ENV"
          # The openvaf 'target' crate build.rs invokes clang + llvm-lib, so the
          # LLVM bin dir must be on PATH (mirrors what build.sh does locally).
          echo "$PREFIX/bin" >> "$GITHUB_PATH"
          # Build ngspice with X (Xaw plotting) and readline support.
          echo "NGSPICE_XREADLINE=--with-x --with-readline=yes" >> "$GITHUB_ENV"

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install llvm@18 automake autoconf libtool bison flex readline ncurses
          # XQuartz provides the X11 headers/libs at /opt/X11 for --with-x.
          brew install --cask xquartz
          PREFIX="$(brew --prefix llvm@18)"
          echo "LLVM_SYS_181_PREFIX=$PREFIX" >> "$GITHUB_ENV"
          # LLVM bin first on PATH so 'clang'/'llvm-lib' resolve to LLVM 18
          # (needed by the openvaf 'target' crate build.rs).
          echo "$PREFIX/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix flex)/bin" >> "$GITHUB_PATH"
          # Build ngspice with X (XQuartz at /opt/X11) and readline. readline is
          # keg-only and needs a terminfo provider (ncurses, also keg-only), so
          # expose both via CPPFLAGS/LDFLAGS env vars (these tolerate the spaces
          # that a configure-arg word-split would not).
          RL="$(brew --prefix readline)"; NC="$(brew --prefix ncurses)"
          echo "NGSPICE_XREADLINE=--with-x --x-includes=/opt/X11/include --x-libraries=/opt/X11/lib --with-readline=yes" >> "$GITHUB_ENV"
          # /opt/X11 must be on the general CPPFLAGS/LDFLAGS too: --with-x adds
          # -lfreetype/-lfontconfig (which live in /opt/X11/lib) to LIBS, and
          # without that -L the readline tgetent/termcap link check fails to
          # link at all -> "Found neither ncurses/terminfo or termcap".
          echo "CPPFLAGS=-I$RL/include -I$NC/include -I/opt/X11/include" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$RL/lib -L$NC/lib -L/opt/X11/lib" >> "$GITHUB_ENV"
          # Build ngspice with Apple's clang (full macOS SDK + system libs such
          # as ncurses/termcap); the Homebrew LLVM clang on PATH (used by
          # openvaf) does not resolve the SDK system-library stubs, which breaks
          # readline's tgetent/terminfo link check.
          echo "NGSPICE_CC=CC=/usr/bin/clang CXX=/usr/bin/clang++" >> "$GITHUB_ENV"

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.OPENVAF_DIR }}/target
          key: cargo-${{ matrix.name }}-${{ hashFiles(format('{0}/Cargo.lock', env.OPENVAF_DIR)) }}
          restore-keys: cargo-${{ matrix.name }}-

      - name: Build openvaf-r
        working-directory: ${{ env.OPENVAF_DIR }}
        run: cargo build --release --features llvm18 --bin openvaf-r

      - name: Build ngspice
        working-directory: ${{ env.NGSPICE_DIR }}
        run: |
          ./autogen.sh
          mkdir -p ci-build && cd ci-build
          # $NGSPICE_XREADLINE carries --with-x / --with-readline (per platform);
          # $NGSPICE_CC pins the compiler on macOS (empty on Linux).
          ../configure --disable-debug --enable-klu --disable-openmp $NGSPICE_CC $NGSPICE_XREADLINE \
            || { echo "===== config.log: termcap/readline detection ====="; \
                 grep -iE 'tputs|tgetent|termcap|terminfo|ncurses|readline' config.log | tail -60; \
                 echo "===== config.log (tail) ====="; tail -60 config.log; exit 1; }
          make -j"$(getconf _NPROCESSORS_ONLN)"

      - name: Stage binaries
        run: |
          mkdir -p "out/bin/${{ matrix.bin }}"
          cp "$OPENVAF_DIR/target/release/openvaf-r" "out/bin/${{ matrix.bin }}/"
          cp "$NGSPICE_DIR/ci-build/src/ngspice"     "out/bin/${{ matrix.bin }}/"
          chmod +x "out/bin/${{ matrix.bin }}/"*
          ls -l "out/bin/${{ matrix.bin }}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.name }}
          path: out/
          if-no-files-found: error

  # --------------------------------------------------------------- Windows
  # Best-effort: ngspice via MSYS2/MinGW; openvaf-r needs LLVM 18 on Windows
  # which is historically fragile, so this job is allowed to fail.
  build-windows:
    name: windows-intel (best-effort)
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel git autoconf automake libtool bison flex
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-readline

      - name: Build ngspice (MSYS2/MinGW)
        working-directory: ${{ env.NGSPICE_DIR }}
        run: |
          ./autogen.sh
          mkdir -p ci-build && cd ci-build
          # Native Windows ngspice uses its own GUI, not X11, so --without-x;
          # readline is enabled (mingw-w64-x86_64-readline).
          ../configure --disable-debug --enable-klu --disable-openmp --with-readline=yes --without-x
          make -j"$(nproc)"

      - name: Build openvaf-r (best-effort)
        working-directory: ${{ env.OPENVAF_DIR }}
        run: |
          # Diagnostic: llvm-sys-181 requires LLVM 18.x; show what MinGW ships.
          echo "MinGW LLVM version: $(llvm-config --version 2>/dev/null || echo '?')"
          export LLVM_SYS_181_PREFIX="$MINGW_PREFIX"
          # Fetch git deps (the pascalkuthe/salsa fork) with the system git so
          # the locked revision is found — cargo's built-in shallow fetch fails
          # to resolve it on the Windows runner.
          export CARGO_NET_GIT_FETCH_WITH_CLI=true
          cargo build --release --features llvm18 --bin openvaf-r

      - name: Stage binaries
        run: |
          mkdir -p out/bin/windows/intel
          cp "$OPENVAF_DIR/target/release/openvaf-r.exe" out/bin/windows/intel/ 2>/dev/null || true
          cp "$NGSPICE_DIR/ci-build/src/ngspice.exe"     out/bin/windows/intel/ 2>/dev/null || true
          ls -l out/bin/windows/intel/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-windows-intel
          path: out/
          if-no-files-found: warn

  # ---------------------------------------------------------------- Collect
  # Download every platform's artifact and commit the binaries into bin/.
  collect:
    name: Commit binaries to bin/
    needs: [build-unix, build-windows]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      # Pull artifacts from EVERY build job that succeeded this run. Only the
      # jobs that finished green uploaded an artifact, so whatever lands here is
      # exactly the set of platforms that built — partial runs are fine.
      # merge-multiple combines each platform's bin/<os>/<arch> tree into one.
      - name: Download successful platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts
          merge-multiple: true
        continue-on-error: true   # don't fail if a run produced zero artifacts

      - name: Stage binaries from successful platforms
        run: |
          if [ ! -d _artifacts/bin ]; then
            echo "No platform produced binaries this run — nothing to commit."
            exit 0
          fi
          cp -R _artifacts/bin/. bin/
          echo "Binaries provided by the platforms that built successfully:"
          find _artifacts/bin -type f | sed 's#_artifacts/##; s/^/  /'

      - name: Commit & push
        run: |
          if [ -z "$(git status --porcelain bin/)" ]; then
            echo "No binary changes to commit (successful platforms already up to date)."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bin/
          git commit -m "ci: update prebuilt binaries [skip ci]"
          # rebase on any concurrent change, then push the successful binaries
          git pull --rebase --autostash origin main
          git push origin main
          echo "Pushed updated binaries for the platforms that built."
